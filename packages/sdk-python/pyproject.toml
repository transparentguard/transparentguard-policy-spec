[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "transparentguard"
version = "0.1.0"
description = "TransparentGuard Python SDK — AI policy enforcement implementing the TransparentGuard Policy Spec (TPS) v1.0"
readme = "README.md"
requires-python = ">=3.9"
license = { text = "MIT" }
keywords = [
  "ai",
  "policy",
  "compliance",
  "llm",
  "guardrails",
  "openai",
  "anthropic",
  "hipaa",
  "gdpr",
  "tps",
  "transparentguard",
]
classifiers = [
  "Development Status :: 4 - Beta",
  "Intended Audience :: Developers",
  "License :: OSI Approved :: MIT License",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3.9",
  "Programming Language :: Python :: 3.10",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Topic :: Security",
  "Topic :: Software Development :: Libraries :: Python Modules",
  "Typing :: Typed",
]
dependencies = [
  "pyyaml>=6.0",
  "httpx>=0.27.0",
  "jsonschema>=4.23.0",
]

[project.optional-dependencies]
openai = ["openai>=1.35.0"]
anthropic = ["anthropic>=0.30.0"]
all = ["openai>=1.35.0", "anthropic>=0.30.0"]
dev = [
  "mypy>=1.11.0",
  "types-PyYAML>=6.0",
  "types-jsonschema>=4.23.0",
  "pytest>=8.0.0",
  "pytest-asyncio>=0.23.0",
]

[project.urls]
Homepage = "https://transparentguard.com"
Source = "https://github.com/transparentguard/sdk-python"
Documentation = "https://transparentguard.com/docs"

[tool.hatch.build.targets.wheel]
packages = ["transparentguard"]

[tool.mypy]
strict = true
python_version = "3.9"

[tool.pytest.ini_options]
asyncio_mode = "auto"
