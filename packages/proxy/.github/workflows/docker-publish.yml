# ============================================================================
# TransparentGuard Proxy — Docker Image Build, Sign, and Publish
#
# Triggers:
#   - Push to main (publishes :latest)
#   - Semver tag push v*.*.* (publishes :vX.Y.Z + :X.Y + :X)
#   - Pull requests against main (build + scan only, no push)
#
# Publishes to: ghcr.io/transparentguard/proxy
# Signing: Cosign keyless (OIDC via GitHub Actions — no secrets to manage)
# ============================================================================

name: Docker Build & Publish

on:
  push:
    branches: [main]
    tags:     ["v*.*.*"]
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: write
  id-token: write   # Required for Cosign OIDC keyless signing

env:
  REGISTRY:   ghcr.io
  IMAGE_NAME: transparentguard/proxy

jobs:
  build-and-push:
    name: Build, Push & Sign
    runs-on: ubuntu-latest

    outputs:
      image: ${{ steps.meta.outputs.tags }}
      digest: ${{ steps.push.outputs.digest }}

    steps:
      # -----------------------------------------------------------------------
      - name: Checkout
        uses: actions/checkout@v4

      # -----------------------------------------------------------------------
      # Install Cosign for keyless image signing
      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      # -----------------------------------------------------------------------
      # Install ORAS CLI for OCI policy artifact publishing
      - name: Install ORAS
        uses: oras-project/setup-oras@v1

      # -----------------------------------------------------------------------
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # -----------------------------------------------------------------------
      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # -----------------------------------------------------------------------
      # Generate OCI image metadata (tags + labels)
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,prefix=sha-,format=short
          labels: |
            org.opencontainers.image.title=TransparentGuard Proxy
            org.opencontainers.image.description=OpenAI-compatible HTTP proxy with AI policy enforcement
            org.opencontainers.image.vendor=TransparentGuard
            org.opencontainers.image.licenses=MIT

      # -----------------------------------------------------------------------
      - name: Build and push Docker image
        id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: packages/proxy/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max
          provenance: true      # SLSA build provenance attestation
          sbom: true            # SBOM attestation (Syft)

      # -----------------------------------------------------------------------
      # Cosign keyless signing — runs only on push (not PRs)
      # Verification: cosign verify ghcr.io/transparentguard/proxy:latest \
      #   --certificate-identity-regexp='https://github.com/transparentguard/proxy' \
      #   --certificate-oidc-issuer='https://token.actions.githubusercontent.com'
      - name: Sign image with Cosign (keyless)
        if: github.event_name != 'pull_request'
        env:
          DIGEST: ${{ steps.push.outputs.digest }}
          TAGS:   ${{ steps.meta.outputs.tags }}
        run: |
          echo "${TAGS}" | tr ',' '\n' | while read -r tag; do
            cosign sign --yes \
              "${tag}@${DIGEST}"
          done

      # -----------------------------------------------------------------------
      # Verify the signature immediately after signing (belt-and-suspenders)
      - name: Verify Cosign signature
        if: github.event_name != 'pull_request'
        env:
          DIGEST: ${{ steps.push.outputs.digest }}
        run: |
          cosign verify \
            "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${DIGEST}" \
            --certificate-identity-regexp='https://github.com/transparentguard/proxy' \
            --certificate-oidc-issuer='https://token.actions.githubusercontent.com'

  # =========================================================================
  # Separate job: scan for vulnerabilities with Trivy (always runs)
  # =========================================================================
  security-scan:
    name: Container Vulnerability Scan
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name != 'pull_request'

    permissions:
      security-events: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ needs.build-and-push.outputs.digest }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH

      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif
