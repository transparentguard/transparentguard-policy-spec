###############################################################################
# TransparentGuard Policy Spec v1.0
# Example: HIPAA
#
# A policy for AI applications that handle Protected Health Information (PHI)
# and must comply with the HIPAA Security Rule and Privacy Rule.
#
# Regulatory basis:
#   HIPAA Privacy Rule:   45 CFR Part 164, Subpart E
#   HIPAA Security Rule:  45 CFR Part 164, Subpart C
#   Minimum Necessary:    45 CFR 164.502(b), 164.514(d)
#   Audit Controls:       45 CFR 164.312(b)
#
# Requirements before using this policy in production:
#   1. Execute a Business Associate Agreement (BAA) with all LLM providers
#      listed in the provider allowlist below.
#   2. Confirm that your audit log destination is covered by a BAA or is
#      an internal system that does not require one.
#   3. Have this policy reviewed by your HIPAA Privacy Officer before
#      the first production deployment.
#   4. Set audit.retention_days to 2555 (7 years) per HIPAA requirements.
#      This is already configured below.
#
# Note: Activating the hipaa compliance_framework adds additional framework
# rules on top of the rules declared in this file. The combination of
# both provides layered PHI protection.
###############################################################################

tps_version: "1.0"
name: "hipaa-production"
description: "HIPAA-compliant policy for AI applications handling Protected Health Information. Enforces PHI redaction on all inbound and outbound content, restricts providers to those covered by BAA, and maintains a 7-year audit trail per 45 CFR 164.312(b). Reviewed by Compliance Team 2026-07-01."

provider:
  - openai/gpt-4o
  - openai/gpt-4o-mini

environments:
  - name: production
    strict: true
  - name: staging
    strict: true
    disabled_rules:
      - enforce-rate-limit
  - name: dev
    strict: false
    disabled_rules:
      - enforce-provider-allowlist
      - enforce-token-budget
      - enforce-rate-limit

compliance_frameworks:
  - hipaa

rules:

  ###############################################################################
  # PROVIDER AND ACCESS CONTROLS
  ###############################################################################

  - id: enforce-provider-allowlist
    description: "Restricts all LLM calls to providers covered by an executed BAA. Any call to a non-BAA provider is blocked. This is a hard requirement for HIPAA compliance when PHI is present in prompts."
    stage: pre-request
    action: enforce
    enforce_type: provider_allowlist
    allowed_providers:
      - openai/gpt-4o
      - openai/gpt-4o-mini
    on_violation: block
    log: true
    metadata:
      regulatory_ref: "HIPAA 45 CFR 164.308(b)(1)"
      control: "Business Associate Contracts"
      baa_status: "Executed with OpenAI as of 2026-01-15"

  - id: enforce-rate-limit
    description: "Enforces per-key rate limits to detect and prevent bulk PHI processing that would require a more restrictive access control review."
    stage: pre-request
    action: enforce
    enforce_type: rate_limit
    max_requests_per_minute_per_key: 30
    max_requests_per_hour_per_key: 300
    on_violation: block
    log: true
    metadata:
      regulatory_ref: "HIPAA 45 CFR 164.312(a)(2)(iii)"
      control: "Automatic Logoff and Session Controls"

  - id: enforce-token-budget
    description: "Enforces token limits. Prevents unusually large requests that might indicate bulk PHI exfiltration."
    stage: pre-request
    action: enforce
    enforce_type: token_budget
    max_tokens_per_request: 8192
    max_tokens_per_day_per_key: 500000
    on_violation: block
    log: true
    metadata:
      regulatory_ref: "HIPAA 45 CFR 164.312(a)(1)"
      control: "Access Control"

  ###############################################################################
  # OUTBOUND PHI CONTROLS (pre-request)
  ###############################################################################

  - id: redact-phi-outbound
    description: "Redacts all 18 HIPAA Safe Harbor PHI identifiers from outbound prompts before they are sent to the LLM provider. Uses the phi shortcut which covers all required identifier types. This is the primary PHI protection control."
    stage: pre-request
    action: redact
    targets:
      - type: pii
        categories: [phi]
        confidence_threshold: 0.75
    on_violation: redact
    log: true
    metadata:
      regulatory_ref: "HIPAA 45 CFR 164.514(b)"
      control: "Safe Harbor De-identification"
      reviewed_by: "Privacy Officer"
      review_date: "2026-07-01"

  - id: block-prompt-injection
    description: "Blocks prompt injection attempts. In a healthcare context, successful prompt injection could cause the model to ignore PHI handling instructions, making this a critical safety control."
    stage: pre-request
    action: classify
    classifier: built-in/prompt-injection-v2
    threshold: 0.75
    on_violation: block
    log: true
    metadata:
      regulatory_ref: "HIPAA 45 CFR 164.312(a)(1)"
      control: "Access Control - Prevent Unauthorized Access via Manipulation"

  - id: block-self-harm-outbound
    description: "Blocks requests soliciting self-harm methods. Required in healthcare AI applications that may be accessed by patients."
    stage: pre-request
    action: classify
    classifier: built-in/self-harm-v1
    threshold: 0.65
    on_violation: block
    log: true

  - id: tag-hipaa-context
    description: "Tags every outbound request with HIPAA compliance context for audit trail completeness."
    stage: pre-request
    action: tag
    tags:
      tg_policy: "hipaa-production"
      tg_compliance_scope: "hipaa"
      tg_data_classification: "phi-possible"
      tg_baa_provider: "openai"

  ###############################################################################
  # INBOUND PHI CONTROLS (post-response)
  ###############################################################################

  - id: redact-phi-inbound
    description: "Redacts PHI from LLM responses before they reach the application. Catches model hallucinations that include real patient identifiers. Uses a slightly higher confidence threshold than outbound redaction because false positives on responses cause poor user experience."
    stage: post-response
    action: redact
    targets:
      - type: pii
        categories: [phi]
        confidence_threshold: 0.80
    on_violation: redact
    log: true
    metadata:
      regulatory_ref: "HIPAA 45 CFR 164.502(b)"
      control: "Minimum Necessary - Inbound PHI Control"

  - id: protect-system-prompt
    description: "Detects and blocks responses that appear to be leaking system prompt content. In a healthcare context, system prompts may contain patient context or configuration details that must not be exposed."
    stage: post-response
    action: enforce
    enforce_type: confidentiality
    protected_content_ref: system_prompt
    similarity_threshold: 0.80
    on_violation: block
    log: true

  - id: block-toxic-output
    description: "Blocks toxic responses. Patient-facing healthcare AI must not return hostile or abusive content."
    stage: post-response
    action: classify
    classifier: built-in/toxicity-v1
    threshold: 0.80
    on_violation: block
    log: true

  - id: log-all-completions
    description: "Records an audit event for every response. Ensures a complete audit trail per HIPAA audit control requirements at 45 CFR 164.312(b), covering all activity including sessions with no violations."
    stage: post-response
    action: log
    log_level: info
    metadata:
      regulatory_ref: "HIPAA 45 CFR 164.312(b)"
      control: "Audit Controls"

audit:
  enabled: true
  destination: "s3://your-hipaa-audit-bucket/tg-logs/"
  format: ndjson
  retention_days: 2555
  include_redacted_content: false
  include_full_request: false
  include_full_response: false
  events:
    - allowed
    - blocked
    - redacted
    - warned
    - error
  batch_size: 25
  flush_interval_ms: 2000
