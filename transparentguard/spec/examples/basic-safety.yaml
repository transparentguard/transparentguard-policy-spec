###############################################################################
# TransparentGuard Policy Spec v1.0
# Example: Basic Safety
#
# A general-purpose safety policy suitable for most AI applications that do
# not operate in a regulated industry. Covers the most common safety risks:
# prompt injection, toxic output, PII leakage, and runaway token spend.
#
# Recommended as a baseline for any production AI deployment before adding
# domain-specific or compliance-specific rules on top.
###############################################################################

tps_version: "1.0"
name: "basic-safety"
description: "General-purpose safety guardrails for production AI applications. Covers prompt injection, PII, toxicity, and token budgets. Not sufficient as a standalone policy for regulated industries."

provider: any

environments:
  - name: production
    strict: true
  - name: staging
    strict: false
  - name: dev
    strict: false
    disabled_rules:
      - enforce-token-budget
      - enforce-provider-allowlist

rules:

  ###############################################################################
  # OUTBOUND SAFETY (pre-request)
  # These rules inspect the request before it is sent to the LLM provider.
  ###############################################################################

  - id: redact-pii-outbound
    description: "Redacts standard PII categories from all outbound prompts. Prevents personal data from being sent to external LLM providers unnecessarily."
    stage: pre-request
    action: redact
    targets:
      - type: pii
        categories: [email, phone, address, ssn, credit_card, bank_account]
        confidence_threshold: 0.80
    on_violation: redact
    log: true
    metadata:
      purpose: "Minimize personal data exposure to external providers."

  - id: block-prompt-injection
    description: "Blocks requests classified as prompt injection attempts. Detects attempts to override system instructions, escape the model's context, or manipulate model behavior through user-controlled input."
    stage: pre-request
    action: classify
    classifier: built-in/prompt-injection-v2
    threshold: 0.80
    on_violation: block
    log: true
    metadata:
      purpose: "Prevent adversarial manipulation of model behavior."

  - id: block-violence-outbound
    description: "Blocks requests containing content that solicits instructions for physical violence or graphic violent content."
    stage: pre-request
    action: classify
    classifier: built-in/violence-v1
    threshold: 0.80
    on_violation: block
    log: true

  - id: block-self-harm-outbound
    description: "Blocks requests containing self-harm ideation or requests for self-harm methods."
    stage: pre-request
    action: classify
    classifier: built-in/self-harm-v1
    threshold: 0.70
    on_violation: block
    log: true
    metadata:
      purpose: "Protect vulnerable users. Threshold is intentionally lower than other classifiers."

  - id: enforce-provider-allowlist
    description: "Restricts all LLM calls to the declared set of approved providers. Any call to an unlisted provider is blocked before it leaves the system."
    stage: pre-request
    action: enforce
    enforce_type: provider_allowlist
    allowed_providers:
      - openai/gpt-4o
      - openai/gpt-4o-mini
      - anthropic/claude-3.5-sonnet
      - anthropic/claude-3-haiku
    on_violation: block
    log: true
    metadata:
      purpose: "Ensure all LLM traffic goes only to approved, contractually covered providers."

  - id: enforce-token-budget
    description: "Enforces token spend limits per request and per API key per day. Prevents runaway spend from bugs, misuse, or prompt injection that causes excessive token usage."
    stage: pre-request
    action: enforce
    enforce_type: token_budget
    max_tokens_per_request: 8192
    max_tokens_per_day_per_key: 1000000
    max_tokens_per_hour_per_key: 100000
    on_violation: block
    log: true
    metadata:
      purpose: "Cost control and abuse prevention."

  - id: tag-request-context
    description: "Attaches policy metadata to every outbound request for audit trail completeness."
    stage: pre-request
    action: tag
    tags:
      tg_policy: "basic-safety"
      tg_policy_version: "1.0"
      tg_environment: "${TG_ENV}"

  ###############################################################################
  # INBOUND SAFETY (post-response)
  # These rules inspect the response before it is returned to the application.
  ###############################################################################

  - id: redact-pii-inbound
    description: "Redacts PII from LLM responses before they reach the application. Catches cases where a model hallucinates or inadvertently includes personal data in its output."
    stage: post-response
    action: redact
    targets:
      - type: pii
        categories: [email, phone, ssn, credit_card]
        confidence_threshold: 0.85
    on_violation: redact
    log: true

  - id: block-toxic-output
    description: "Blocks responses classified as toxic. Prevents the application from returning abusive, hostile, or harassing content to end users."
    stage: post-response
    action: classify
    classifier: built-in/toxicity-v1
    threshold: 0.85
    on_violation: block
    log: true

  - id: block-hate-speech-output
    description: "Blocks responses containing hate speech targeting protected identity characteristics."
    stage: post-response
    action: classify
    classifier: built-in/hate-speech-v1
    threshold: 0.80
    on_violation: block
    log: true

  - id: protect-system-prompt
    description: "Detects responses that appear to be leaking system prompt content back to the user. Blocks the response if leakage is detected."
    stage: post-response
    action: enforce
    enforce_type: confidentiality
    protected_content_ref: system_prompt
    similarity_threshold: 0.85
    on_violation: block
    log: true
    metadata:
      purpose: "Prevent exposure of internal system configuration through model output."

  - id: log-all-responses
    description: "Records an audit event for every response that passes all rules. Ensures a complete audit trail even when no violations occur."
    stage: post-response
    action: log
    log_level: info

audit:
  enabled: true
  destination: "file://./logs/tg-audit.jsonl"
  format: ndjson
  retention_days: 365
  include_redacted_content: false
  include_full_request: false
  include_full_response: false
  events:
    - allowed
    - blocked
    - redacted
    - warned
    - error
  batch_size: 50
  flush_interval_ms: 3000
