###############################################################################
# TransparentGuard Policy Spec v1.0
# Example: Minimal
#
# The smallest valid TPS policy file. Use this as a starting point.
# This policy redacts email addresses and phone numbers from outbound
# requests and logs every evaluation.
###############################################################################

tps_version: "1.0"
name: "minimal"
description: "The smallest valid TPS policy. A starting point for new deployments."

rules:
  - id: redact-basic-pii
    stage: pre-request
    action: redact
    targets:
      - type: pii
        categories: [email, phone]
    on_violation: redact
    log: true

audit:
  enabled: true
  destination: "stdout://"
