apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "transparentguard-proxy.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "transparentguard-proxy.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "transparentguard-proxy.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "transparentguard-proxy.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      {{- with .Values.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: proxy
          image: {{ include "transparentguard-proxy.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          args:
            - "--policy"
            - {{ include "transparentguard-proxy.policyArg" . | quote }}
            - "--upstream"
            - {{ .Values.upstream.url | quote }}
            - "--port"
            - "8080"
          env:
            - name: PORT
              value: "8080"
            {{- if .Values.upstream.apiKeySecret.name }}
            - name: UPSTREAM_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.upstream.apiKeySecret.name }}
                  key: {{ .Values.upstream.apiKeySecret.key }}
            {{- end }}
            {{- if .Values.tg.apiKeySecret.name }}
            - name: TG_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.tg.apiKeySecret.name }}
                  key: {{ .Values.tg.apiKeySecret.key }}
            {{- end }}
            {{- if .Values.otel.endpoint }}
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: {{ .Values.otel.endpoint | quote }}
            - name: OTEL_SERVICE_NAME
              value: {{ .Values.otel.serviceName | quote }}
            {{- if .Values.otel.headers }}
            - name: OTEL_EXPORTER_OTLP_HEADERS
              value: {{ .Values.otel.headers | quote }}
            {{- end }}
            {{- end }}
            {{- if .Values.policy.cosign.verify }}
            - name: TG_COSIGN_VERIFY
              value: "true"
            {{- if .Values.policy.cosign.publicKeyPath }}
            - name: TG_COSIGN_PUBLIC_KEY_PATH
              value: {{ .Values.policy.cosign.publicKeyPath | quote }}
            {{- end }}
            {{- end }}
            {{- with .Values.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- with .Values.extraEnvFrom }}
          envFrom:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          livenessProbe:
            {{- toYaml .Values.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.readinessProbe | nindent 12 }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            {{- if and .Values.policy.content (not .Values.policy.ociRef) }}
            - name: policy
              mountPath: /etc/tg
              readOnly: true
            {{- end }}
      volumes:
        {{- if and .Values.policy.content (not .Values.policy.ociRef) }}
        - name: policy
          configMap:
            name: {{ include "transparentguard-proxy.fullname" . }}-policy
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
