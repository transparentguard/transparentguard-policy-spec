{{- if and .Values.policy.content (not .Values.policy.ociRef) }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "transparentguard-proxy.fullname" . }}-policy
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "transparentguard-proxy.labels" . | nindent 4 }}
data:
  policy.yaml: |
    {{- .Values.policy.content | nindent 4 }}
{{- end }}
