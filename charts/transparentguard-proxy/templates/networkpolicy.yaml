{{- if .Values.networkPolicy.enabled }}
# ---------------------------------------------------------------------------
# TransparentGuard Proxy — Network Policy
#
# Ingress:  Allow traffic only from pods in the same namespace (or optionally
#           from pods matching namespaceSelector / podSelector).
# Egress:   Allow DNS resolution (port 53) and HTTPS (port 443) for upstream
#           LLM API calls. All other egress is denied.
# ---------------------------------------------------------------------------
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "transparentguard-proxy.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "transparentguard-proxy.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "transparentguard-proxy.selectorLabels" . | nindent 6 }}

  policyTypes:
    - Ingress
    - Egress

  # ── Ingress ──────────────────────────────────────────────────────────────
  ingress:
    {{- if .Values.networkPolicy.ingress }}
    {{- toYaml .Values.networkPolicy.ingress | nindent 4 }}
    {{- else }}
    # Default: allow traffic from any pod in the same namespace
    - from:
        - podSelector: {}
      ports:
        - port: 8080
          protocol: TCP
    {{- end }}
    {{- if .Values.networkPolicy.allowMetricsScrape }}
    # Allow Prometheus / metrics scraper
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - port: {{ .Values.metrics.port | default 9090 }}
          protocol: TCP
    {{- end }}

  # ── Egress ───────────────────────────────────────────────────────────────
  egress:
    # DNS — required for provider API hostnames to resolve
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP

    # HTTPS — upstream LLM API calls and optional TG license/classifier API
    - ports:
        - port: 443
          protocol: TCP

    {{- if .Values.networkPolicy.extraEgressPorts }}
    # Extra egress ports defined in values.networkPolicy.extraEgressPorts
    - ports:
        {{- range .Values.networkPolicy.extraEgressPorts }}
        - port: {{ . }}
          protocol: TCP
        {{- end }}
    {{- end }}

    {{- if .Values.networkPolicy.egress }}
    {{- toYaml .Values.networkPolicy.egress | nindent 4 }}
    {{- end }}
{{- end }}
