# =============================================================================
# TransparentGuard Proxy — Helm values
# =============================================================================

# ---------------------------------------------------------------------------
# Image
# ---------------------------------------------------------------------------
image:
  repository: ghcr.io/transparentguard/proxy
  tag: ""          # defaults to Chart.appVersion
  pullPolicy: IfNotPresent

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

# ---------------------------------------------------------------------------
# Policy
# ---------------------------------------------------------------------------
policy:
  # Load from an OCI artifact reference (recommended for production):
  #   ociRef: "oci://ghcr.io/myorg/my-policy:v1.0.0"
  # Or embed the policy YAML inline:
  #   content: |
  #     tps_version: "1.0"
  #     name: production
  #     ...
  ociRef: ""
  content: ""

  # Cosign signature verification for OCI-loaded policies
  cosign:
    verify: false
    # Path to PEM public key inside the container (mount via secret)
    publicKeyPath: ""

# ---------------------------------------------------------------------------
# Upstream LLM provider
# ---------------------------------------------------------------------------
upstream:
  # Base URL of the upstream LLM API
  url: "https://api.openai.com"
  # Secret containing the upstream API key.
  # The secret must have a key named "api-key".
  apiKeySecret:
    name: ""
    key: "api-key"

# ---------------------------------------------------------------------------
# TransparentGuard license (paid-tier features)
# ---------------------------------------------------------------------------
tg:
  apiKeySecret:
    name: ""
    key: "api-key"

# ---------------------------------------------------------------------------
# Deployment
# ---------------------------------------------------------------------------
replicaCount: 2

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

# ---------------------------------------------------------------------------
# Autoscaling (HPA)
# ---------------------------------------------------------------------------
autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

# ---------------------------------------------------------------------------
# Service
# ---------------------------------------------------------------------------
service:
  type: ClusterIP
  port: 80
  targetPort: 8080
  annotations: {}

# ---------------------------------------------------------------------------
# Ingress
# ---------------------------------------------------------------------------
ingress:
  enabled: false
  className: ""
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # cert-manager.io/cluster-issuer: letsencrypt-prod
  hosts:
    - host: proxy.transparentguard.example.com
      paths:
        - path: /
          pathType: Prefix
  tls: []
  # - secretName: tg-proxy-tls
  #   hosts:
  #     - proxy.transparentguard.example.com

# ---------------------------------------------------------------------------
# OpenTelemetry
# ---------------------------------------------------------------------------
otel:
  # Set to your OTEL collector endpoint to enable tracing + metrics
  # e.g. http://otel-collector.monitoring.svc.cluster.local:4318
  endpoint: ""
  serviceName: "transparentguard-proxy"
  # Additional OTLP headers (e.g. for Grafana Cloud, Honeycomb, Datadog)
  # Format: "key1=value1,key2=value2"
  headers: ""

# ---------------------------------------------------------------------------
# Pod configuration
# ---------------------------------------------------------------------------
podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port:   "8080"
  prometheus.io/path:   "/metrics"

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000
  seccompProfile:
    type: RuntimeDefault

# Container-level security context — applied to every container in the pod.
# These defaults satisfy the Kubernetes "restricted" Pod Security Standard.
securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 1000
  capabilities:
    drop: [ALL]
  seccompProfile:
    type: RuntimeDefault

# ---------------------------------------------------------------------------
# Network Policy (Phase 10 — self-hosted security posture)
# Requires a CNI that supports NetworkPolicy (Calico, Cilium, Weave, etc.)
# ---------------------------------------------------------------------------
networkPolicy:
  # Set to true to create a NetworkPolicy resource.
  # When disabled the proxy is reachable from any pod in the cluster.
  enabled: false

  # Ingress rules. When omitted, defaults to allow-from-same-namespace on port 8080.
  # Use this to restrict which namespaces / pods can call the proxy.
  ingress: []
  # Example — only allow traffic from pods labelled app=my-service:
  # ingress:
  #   - from:
  #       - podSelector:
  #           matchLabels:
  #             app: my-service
  #     ports:
  #       - port: 8080
  #         protocol: TCP

  # Allow Prometheus to scrape /metrics from the monitoring namespace
  allowMetricsScrape: false

  # Additional TCP egress ports beyond DNS (53) and HTTPS (443).
  # Add port 9090 here if your OTEL collector is HTTP, for example.
  extraEgressPorts: []

  # Fully custom egress rules. When set, appended to the generated egress list.
  egress: []

nodeSelector: {}
tolerations: []
affinity: {}

# ---------------------------------------------------------------------------
# Readiness / liveness probes
# ---------------------------------------------------------------------------
livenessProbe:
  httpGet:
    path: /health
    port: 8080
  initialDelaySeconds: 10
  periodSeconds: 15
  timeoutSeconds: 3
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /ready
    port: 8080
  initialDelaySeconds: 5
  periodSeconds: 10
  timeoutSeconds: 3
  failureThreshold: 3

# ---------------------------------------------------------------------------
# Topology spread (production HA)
# ---------------------------------------------------------------------------
topologySpreadConstraints:
  - maxSkew: 1
    topologyKey: kubernetes.io/hostname
    whenUnsatisfiable: DoNotSchedule
    labelSelector:
      matchLabels:
        app.kubernetes.io/name: transparentguard-proxy

# ---------------------------------------------------------------------------
# Extra environment variables
# ---------------------------------------------------------------------------
extraEnv: []
# - name: MY_VAR
#   value: "my-value"

extraEnvFrom: []
# - secretRef:
#     name: my-secret
